name: riscv-docker-lab

on:
  push:
    branches:
      - "**"
    paths:
      - ".ci/docker/ubuntu-cross-riscv/**"
      - ".ci/docker/build.sh"
      - ".github/workflows/riscv-docker-lab.yml"
  pull_request:
    paths:
      - ".ci/docker/ubuntu-cross-riscv/**"
      - ".ci/docker/build.sh"
      - ".github/workflows/riscv-docker-lab.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  docker-build:
    name: ubuntu-cross-riscv
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build RISC-V cross image
        shell: bash
        run: |
          mkdir -p artifacts/docker/logs
          docker buildx build \
            --progress plain \
            --cache-from type=gha,scope=riscv-cross \
            --cache-to type=gha,mode=max,scope=riscv-cross \
            --build-arg UBUNTU_VERSION=24.04 \
            --target final \
            -f .ci/docker/ubuntu-cross-riscv/Dockerfile \
            -t pytorch-riscv-cross:ci \
            .ci/docker 2>&1 | tee artifacts/docker/logs/docker-build.log

      - name: Validate image metadata
        shell: bash
        run: |
          docker image inspect pytorch-riscv-cross:ci > artifacts/docker/image-inspect.json
          {
            echo "# RISC-V Docker image"
            echo
            echo "- Image: \`pytorch-riscv-cross:ci\`"
            echo "- Docker cache: \`type=gha,scope=riscv-cross\`"
            echo "- Log artifact: \`docker-build.log\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Docker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-docker-${{ github.run_attempt }}
          path: artifacts/docker
          if-no-files-found: error
