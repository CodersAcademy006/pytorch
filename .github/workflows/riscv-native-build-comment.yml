name: riscv-native-build-comment

# Native (non-QEMU) PyTorch build+test on the RISE riscv64 runner, comment-triggered.
#
# `/run-riscv-preflight` -- fast (~minutes): reports real hardware limits
#   (cores/RAM/disk), toolchain versions, and whether key build deps
#   (numpy, pyyaml, etc.) have riscv64 wheels on PyPI or must build from
#   source. Run this first -- the actual build time depends entirely on
#   what it finds.
#
# `/run-riscv-full-build` -- the real thing: `pip install -e . -v
# --no-build-isolation` (per repo CLAUDE.md, the only sanctioned build
# command) on native riscv64, then `python test/test_torch.py`. Can take
# many hours on a 4-core board; only run after preflight looks sane.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  preflight:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/run-riscv-preflight') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-24.04-riscv
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Hardware + toolchain
        id: info
        run: |
          {
            echo "### Hardware"
            echo '```'
            uname -a
            nproc
            free -h
            df -h /
            echo "### Toolchain"
            gcc --version | head -1
            cmake --version | head -1
            python3 --version
            pip3 --version
            echo '```'
          } | tee report.md

      - name: Key build-dep wheel availability (riscv64)
        timeout-minutes: 5
        run: |
          {
            echo "### riscv64 wheel availability (pip download, no build)"
            echo '```'
            timeout 60 python3 -m venv /tmp/probe
            source /tmp/probe/bin/activate
            pip --default-timeout=20 install -q --upgrade pip
            for pkg in numpy pyyaml typing_extensions sympy filelock jinja2 fsspec networkx; do
              if timeout 30 pip --default-timeout=20 download --no-deps --dest /tmp/wheelcheck "$pkg" 2>&1 | tail -1 | grep -qi "\.whl"; then
                echo "$pkg: WHEEL"
              else
                echo "$pkg: SDIST (builds from source) or timed out"
              fi
            done
            echo '```'
          } | tee -a report.md

      - name: Post report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file report.md

  full-build:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/run-riscv-full-build') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-24.04-riscv
    timeout-minutes: 1440
    env:
      USE_CUDA: "0"
      USE_DISTRIBUTED: "0"
      BUILD_TEST: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          submodules: recursive

      - name: Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build python3-dev python3-venv git

      - name: Build (pip install -e . -v --no-build-isolation)
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -U pip
          pip install -r requirements.txt
          MAX_JOBS="$(nproc)" pip install -e . -v --no-build-isolation

      - name: Test dependencies
        run: |
          source .venv/bin/activate
          # torch.testing._internal.common_utils needs these; requirements.txt
          # only covers the build, so test/test_torch.py cannot even import
          # without them.
          pip install expecttest hypothesis unittest-xml-reporting psutil pyyaml

      - name: Smoke (import and real op)
        run: |
          source .venv/bin/activate
          python - <<'PY'
          import platform, torch
          print("machine:", platform.machine())
          print("torch  :", torch.__version__)
          a = torch.randn(128, 128)
          b = torch.randn(128, 128)
          assert (a @ b).shape == (128, 128)
          print("matmul : ok")
          assert torch.arange(10, dtype=torch.float32).sum().item() == 45.0
          print("reduce : ok")
          PY

      - name: Test (test/test_torch.py)
        run: |
          source .venv/bin/activate
          set -o pipefail
          # Bounded: the full suite can outrun the job budget on a 4-core U74,
          # and a timeout that yields nothing is worse than a partial result.
          timeout 21600 python test/test_torch.py -v 2>&1 | tail -60

      - name: Post result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body \
            "Native riscv64 full build+test: **${{ job.status }}**
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
