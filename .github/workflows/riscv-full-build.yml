name: riscv-full-build

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/riscv-full-build.yml"
      - ".ci/riscv/**"
  pull_request:
    paths:
      - ".github/workflows/riscv-full-build.yml"
      - ".ci/riscv/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to build (defaults to the triggering ref)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  full-build:
    name: cross-build-riscv64
    runs-on: ubuntu-24.04
    timeout-minutes: 340
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: false

      - name: Environment summary
        shell: bash
        run: |
          mkdir -p artifacts/full-build/logs
          {
            echo "# Environment summary"
            echo
            echo "- nproc: \`$(nproc)\`"
            echo '```'
            echo "--- free -h ---"; free -h
            echo "--- df -h ---"; df -h
            echo "--- docker version ---"; docker version --format '{{.Server.Version}}' || true
            echo '```'
          } | tee artifacts/full-build/logs/environment.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Free disk space (remove unused preinstalled SDKs)
        shell: bash
        run: |
          before=$(df --output=avail -BG / | tail -1 | tr -dc '0-9')
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" \
            /usr/local/.ghcup /opt/az /usr/lib/jvm || true
          docker image prune -af || true
          after=$(df --output=avail -BG / | tail -1 | tr -dc '0-9')
          echo "- Freed disk space: \`${before}G\` -> \`${after}G\` available" >> "${GITHUB_STEP_SUMMARY}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Build (or reuse cached) cross-compile image
        shell: bash
        run: |
          docker buildx build \
            --load \
            --progress plain \
            --cache-from type=gha,scope=riscv-cross \
            --cache-to type=gha,mode=max,scope=riscv-cross \
            --build-arg UBUNTU_VERSION=24.04 \
            --target final \
            -f .ci/docker/ubuntu-cross-riscv/Dockerfile \
            -t pytorch-riscv-cross:ci \
            .ci/docker 2>&1 | tee artifacts/full-build/logs/docker-build.log
          docker image inspect pytorch-riscv-cross:ci --format '{{.Size}}' > artifacts/full-build/image-size-bytes.txt

      - name: Cross-build PyTorch (.ci/pytorch/build.sh)
        shell: bash
        run: |
          set +e
          docker run --rm \
            -e BUILD_ENVIRONMENT=linux-noble-riscv64-py3.12-gcc14-cross-build \
            -e MAX_JOBS="$(nproc)" \
            -v "${GITHUB_WORKSPACE}:/var/lib/jenkins/workspace" \
            -w /var/lib/jenkins/workspace \
            --user jenkins \
            pytorch-riscv-cross:ci \
            bash .ci/pytorch/build.sh \
            2>&1 | tee artifacts/full-build/logs/pytorch-build.log
          echo "build_exit=${PIPESTATUS[0]}" >> "${GITHUB_ENV}"

      - name: Record build result
        if: always()
        shell: bash
        run: |
          {
            echo "# RISC-V full cross-build"
            echo
            echo "- Result: \`${build_exit:-unknown}\`"
            if [ -f artifacts/full-build/image-size-bytes.txt ]; then
              echo "- Docker image size: \`$(( $(cat artifacts/full-build/image-size-bytes.txt) / 1024 / 1024 ))MB\`"
            fi
            echo "- Full build log: \`pytorch-build.log\` (uploaded artifact)"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload full-build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-full-build-${{ github.run_attempt }}
          path: artifacts/full-build
          if-no-files-found: warn

      - name: Gate on build result
        shell: bash
        run: test "${build_exit:-1}" = "0"
