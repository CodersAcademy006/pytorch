## Comment `/run-numba-probe` on a PR in this fork to run it.
##
## Question this answers: llvmlite's riscv64 status (numba/llvmlite#923) has been
## "binding layer does not work, MCJIT/RuntimeDyld lack RISC-V" since 2023. Since
## then OrcJIT/JITLink landed and llvmlite moved to LLVM 22, and RuyiRepo now
## publishes manylinux_2_38_riscv64 wheels daily. Nobody has re-tested on real
## hardware. This does that.
name: riscv-numba-probe

on:
  issue_comment:
    types: [created]

jobs:
  probe:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/run-numba-probe') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-24.04-riscv
    timeout-minutes: 120
    env:
      RUYI_INDEX: https://ruyirepo.ruyicommunity.cn/pypi/simple/
    steps:
      - name: Hardware and interpreter
        run: |
          uname -a
          echo "cores: $(nproc)"
          free -h || true
          python3 --version
          python3 -c "import sysconfig; print('platform tag:', sysconfig.get_platform())"

      - name: Install llvmlite from RuyiRepo
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          # index-url (not extra-index-url) and a pinned version: with both
          # indexes visible pip picks the highest version, which is PyPI's 0.48.0
          # sdist, and building that needs an LLVM 22 install we do not have.
          # 0.47.0 is the newest RuyiRepo riscv64 wheel with a cp312 build.
          # llvmlite has no runtime deps, so restricting the index is safe.
          pip install -i "$RUYI_INDEX" "llvmlite==0.47.0"
          pip list | grep -i llvmlite

      - name: llvmlite JIT probe
        run: |
          . .venv/bin/activate
          python - <<'PY'
          import ctypes
          from importlib.metadata import version
          import llvmlite.binding as llvm

          print("llvmlite version:", version("llvmlite"))
          # 0.47 removed binding.initialize(); LLVM init is automatic now.
          print("default triple  :", llvm.get_default_triple())
          print("jit api present :", sorted(n for n in dir(llvm) if "jit" in n.lower()))

          triple = llvm.get_default_triple()
          asm = f'''
          target triple = "{triple}"
          define i32 @add(i32 %a, i32 %b) {{
          entry:
            %r = add i32 %a, %b
            ret i32 %r
          }}
          '''
          llvm.parse_assembly(asm).verify()
          print("ir parse+verify : ok")

          # llvmlite ships its own JIT smoke check; use it rather than a
          # hand-rolled one.
          try:
              llvm.check_jit_execution()
              print("check_jit_execution: ok")
          except Exception as e:
              print("check_jit_execution: FAILED", type(e).__name__, e)

          # The actual open question: does OrcJIT/LLJIT (which replaced the
          # RuntimeDyld path that lacked RISC-V) execute real code on riscv64?
          lljit = llvm.create_lljit_compiler()
          lib = (llvm.JITLibraryBuilder()
                 .add_ir(asm)
                 .export_symbol("add")
                 .link(lljit, "probe"))
          ptr = lib["add"]
          print("LLJIT symbol    : ok ->", hex(ptr))
          got = ctypes.CFUNCTYPE(ctypes.c_int, ctypes.c_int, ctypes.c_int)(ptr)(2, 3)
          print("LLJIT add(2,3)  :", got)
          assert got == 5, f"JIT returned {got}, expected 5"
          print("RESULT          : ORCJIT EXECUTES CORRECTLY ON NATIVE riscv64")
          PY

      - name: llvmlite test suite
        continue-on-error: true
        run: |
          . .venv/bin/activate
          set -o pipefail
          timeout 3600 python -m llvmlite.tests 2>&1 | tail -45

      - name: numba (RuyiRepo riscv64 wheels are cp314 only; runner is cp312)
        continue-on-error: true
        run: |
          . .venv/bin/activate
          # Expected to find nothing: every RuyiRepo numba riscv64 wheel is cp314,
          # and stock Ubuntu 24.04 ships python 3.12. Recording the exact failure
          # is the point, so pin rather than let pip fall back to a PyPI sdist.
          pip install -i "$RUYI_INDEX" "numba==0.64.0" 2>&1 | tail -12 || true
          python - <<'PY'
          try:
              import numba
              from numba import njit
              @njit
              def f(a, b):
                  return a + b
              print("numba version   :", numba.__version__)
              print("njit f(1,2)     :", f(1, 2))
          except Exception as e:
              print("numba unavailable:", type(e).__name__, e)
          PY

      - name: Post result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body \
            "RuyiRepo llvmlite/numba riscv64 probe: **${{ job.status }}**
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
